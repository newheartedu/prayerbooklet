            const [currentView, setCurrentView] = useState('home');
            const [selectedBlessing, setSelectedBlessing] = useState(null);
            const [baseFontSize, setBaseFontSize] = useState(16);

            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [currentView, selectedBlessing]);

            const handleBlessingClick = (blessing) => {
                setSelectedBlessing(blessing);
                setCurrentView('blessing');
            };

            const goHome = () => {
                setCurrentView('home');
                setTimeout(() => setSelectedBlessing(null), 300);
            };

            return (
                <div className="min-h-screen">
                    <nav className="sticky top-0 z-50 bg-[#FDFBF7]/80 backdrop-blur-md border-b border-[#E2E8DE] px-4 md:px-6 py-4 flex items-center justify-between shadow-sm">
                        <div className="w-16 md:w-24">
                            {currentView !== 'home' && (
                                <button onClick={goHome} className="text-[#5E7163] hover:text-[#334139] transition-colors flex items-center gap-1">
                                    <SVGIcon name="ChevronLeft" size={20} />
                                    <span className="text-sm tracking-widest hidden sm:inline font-bold">返回</span>
                                </button>
                            )}
                        </div>
                        
                        <h1 className="text-2xl md:text-3xl font-serif text-[#5E7163] tracking-[0.2em] font-bold text-center flex-1">
                            防疫滿福寶
                        </h1>

                        <div className="flex items-center gap-2 w-auto justify-end text-[#5E7163]" title="調整字體大小">
                            <span className="text-xs font-bold">A</span>
                            <input 
                                type="range" min="14" max="26" value={baseFontSize} 
                                onChange={(e) => setBaseFontSize(Number(e.target.value))}
                                className="w-16 md:w-24 accent-[#5E7163] cursor-pointer"
                            />
                            <span className="text-lg font-bold">A</span>
                        </div>
                    </nav>

                    <main className="max-w-3xl mx-auto px-6 py-10">
                        {currentView === 'home' && (
                            <div className="animate-fade-in-up">
                                <section className="mb-14 text-center">
                                    <div className="inline-flex justify-center items-center w-12 h-12 rounded-full bg-[#E2E8DE] text-[#5E7163] mb-6">
                                        <SVGIcon name="BookOpen" size={24} />
                                    </div>
                                    <h2 className="text-2xl font-serif text-[#334139] mb-4 tracking-wider font-bold">甚麼是滿福寶？</h2>
                                    <p className="text-[#6B7280] text-justify md:text-center px-2 md:px-10 font-bold" style={{ fontSize: `${baseFontSize}px`, lineHeight: '1.8' }}>
                                        {introText}
                                    </p>
                                </section>

                                <div className="w-12 h-px bg-[#E2E8DE] mx-auto mb-14"></div>

                                <section className="mb-16">
                                    <h2 className="text-xl font-serif text-[#334139] mb-8 text-center tracking-widest font-bold">現在您最希望得到甚麼祝福？</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {blessings.map((blessing) => (
                                            <button key={blessing.id} onClick={() => handleBlessingClick(blessing)} className="group relative bg-white border border-[#EBEBEB] p-6 rounded-2xl flex items-center gap-5 hover:border-[#5E7163]/30 hover:shadow-[0_8px_30px_rgb(0,0,0,0.04)] transition-all duration-300 text-left overflow-hidden">
                                                <div className="w-12 h-12 rounded-full bg-[#F5F7F4] text-[#5E7163] flex items-center justify-center group-hover:bg-[#5E7163] group-hover:text-white transition-colors duration-300 shrink-0">
                                                    <SVGIcon name={blessing.icon} size={24} />
                                                </div>
                                                <div>
                                                    <span className="text-sm text-[#A0AAB2] mb-1 block font-bold">祝福 {blessing.id}</span>
                                                    <h3 className="text-lg font-bold tracking-wide text-[#334139]">{blessing.title}</h3>
                                                </div>
                                                <div className="absolute right-6 opacity-0 translate-x-4 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 text-[#5E7163]">
                                                    <SVGIcon name="ChevronLeft" size={20} className="rotate-180" />
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </section>

                                <section className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <button onClick={() => setCurrentView('steps')} className="bg-[#5E7163] text-white p-6 rounded-2xl text-left hover:bg-[#4a5a4f] transition-colors shadow-sm flex flex-col gap-3">
                                        <SVGIcon name="Info" size={24} className="opacity-80" />
                                        <h3 className="text-lg font-bold tracking-wide">得著滿福寶的<br/>四個步驟</h3>
                                    </button>
                                    <button onClick={() => setCurrentView('keys')} className="bg-white border border-[#5E7163]/20 text-[#5E7163] p-6 rounded-2xl text-left hover:bg-[#F5F7F4] transition-colors shadow-sm flex flex-col gap-3">
                                        <SVGIcon name="CheckCircle2" size={24} className="opacity-80" />
                                        <h3 className="text-lg font-bold tracking-wide">持續得著滿福寶的<br/>三個關鍵</h3>
                                    </button>
                                </section>
                            </div>
                        )}

                        {currentView === 'blessing' && selectedBlessing && (
                            <article className="animate-fade-in-up max-w-2xl mx-auto">
                                <header className="text-center mb-12">
                                    <div className="inline-flex justify-center items-center w-16 h-16 rounded-full bg-[#E2E8DE] text-[#5E7163] mb-6">
                                        <SVGIcon name={selectedBlessing.icon} size={24} />
                                    </div>
                                    <h2 className="text-3xl font-serif text-[#334139] tracking-widest font-bold">{selectedBlessing.title}</h2>
                                </header>

                                <section className="mb-12 space-y-6">
                                    {selectedBlessing.verses.map((verse, idx) => (
                                        <blockquote key={idx} className="relative p-6 md:p-8 bg-white border-l-4 border-[#5E7163] rounded-r-2xl shadow-sm">
                                            <p className="text-[#6B7280] font-serif font-bold" style={{ fontSize: `${baseFontSize}px`, lineHeight: '1.8' }}>
                                                {verse}
                                            </p>
                                        </blockquote>
                                    ))}
                                </section>

                                <div className="flex items-center gap-4 my-12">
                                    <div className="h-px bg-[#E2E8DE] flex-1"></div>
                                    <span className="text-[#A0AAB2] tracking-[0.3em] text-sm font-bold">禱告文</span>
                                    <div className="h-px bg-[#E2E8DE] flex-1"></div>
                                </div>

                                <section className="bg-white rounded-3xl p-6 md:p-10 shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-[#F0F0F0]">
                                    <div className="space-y-8">
                                        <PrayerStep num="1" title="感謝" content={selectedBlessing.prayer.thanks} baseFontSize={baseFontSize} />
                                        <PrayerStep num="2" title="邀請" content={selectedBlessing.prayer.invite} baseFontSize={baseFontSize} />
                                        <PrayerStep num="3" title="祈求" content={selectedBlessing.prayer.plea} isLong baseFontSize={baseFontSize} />
                                        <PrayerStep num="4" title="誠心" content={selectedBlessing.prayer.sincere} baseFontSize={baseFontSize} />
                                    </div>
                                </section>
                            </article>
                        )}

                        {currentView === 'steps' && (
                            <article className="animate-fade-in-up max-w-2xl mx-auto">
                                <header className="mb-12 text-center">
                                    <h2 className="text-3xl font-serif text-[#334139] tracking-widest font-bold">得著滿福寶的四個步驟</h2>
                                </header>
                                <div className="space-y-6">
                                    {stepsToGet.map((step, idx) => (
                                        <div key={idx} className="bg-white p-8 rounded-2xl shadow-sm border border-[#F0F0F0]">
                                            <h3 className="text-lg font-bold text-[#5E7163] mb-4 flex items-center gap-3">
                                                <span className="w-8 h-8 rounded-full bg-[#E2E8DE] flex items-center justify-center text-sm font-serif">{idx + 1}</span>
                                                {step.title}
                                            </h3>
                                            <p className="text-[#6B7280] pl-11 font-bold" style={{ fontSize: `${baseFontSize}px`, lineHeight: '1.8' }}>
                                                {step.content}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </article>
                        )}

                        {currentView === 'keys' && (
                            <article className="animate-fade-in-up max-w-2xl mx-auto">
                                <header className="mb-12 text-center">
                                    <h2 className="text-3xl font-serif text-[#334139] tracking-widest font-bold">持續得著滿福寶的三個關鍵</h2>
                                    <p className="text-[#A0AAB2] mt-4 font-bold" style={{ fontSize: `${baseFontSize - 2}px` }}>恭喜你已經用前面的禱告文禱告，為了幫助你持續活在滿福寶的七重祝福裏，有三個重要提醒。</p>
                                </header>
                                <div className="space-y-6">
                                    {keysToKeep.map((key, idx) => (
                                        <div key={idx} className="bg-white p-8 rounded-2xl shadow-sm border border-[#F0F0F0]">
                                            <h3 className="text-lg font-bold text-[#5E7163] mb-4 flex items-center gap-3">
                                                <span className="w-8 h-8 rounded-full bg-[#F5F7F4] flex items-center justify-center text-sm font-serif border border-[#E2E8DE]">{idx + 1}</span>
                                                {key.title}
                                            </h3>
                                            <p className="text-[#6B7280] pl-11 whitespace-pre-wrap font-bold" style={{ fontSize: `${baseFontSize}px`, lineHeight: '1.8' }}>
                                                {key.content}
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </article>
                        )}
                    </main>

                    <footer className="mt-20 py-8 border-t border-[#E2E8DE] text-center">
                        <p className="text-[#A0AAB2] text-sm tracking-wider font-bold mb-2">愛文協會</p>
                        <p className="text-[#C1C8C3] text-xs font-bold">社團法人中華民國基督教愛文福音藝術傳播協會</p>
                    </footer>
                </div>
            );
        }

        // 啟動 React 應用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
